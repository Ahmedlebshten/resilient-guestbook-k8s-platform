name: DevSecOps CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Clean Workspace
        run: |
          echo "Cleaning up previous runs..."
          find "${{ github.workspace }}" -mindepth 1 -delete 2>/dev/null || true

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Prune Docker Cache
        run: |
          docker builder prune -af || true
          docker image prune -af || true

      - name: Build Docker Image
        working-directory: ./app
        run: |
          VERSION="v${{ github.run_number }}"
          docker build --no-cache --pull -t ahmedlebshten/guestbook:$VERSION .
          docker tag ahmedlebshten/guestbook:$VERSION ahmedlebshten/guestbook:latest

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ahmedlebshten/guestbook:v${{ github.run_number }}'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Docker Hub Login and Push
        run: |
          VERSION="v${{ github.run_number }}"
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ahmedlebshten/guestbook:$VERSION
          docker push ahmedlebshten/guestbook:latest

      - name: GitOps - Update Image Tag in Manifest
        run: |
          VERSION="v${{ github.run_number }}"
          git config --global user.email "ahmed-bot@github.com"
          git config --global user.name "Ahmed DevOps Bot"
          
          TARGET_FILE="$GITHUB_WORKSPACE/k8s-manifests/app-deployment.yml"
          sed -i "s|image: ahmedlebshten/guestbook:.*|image: ahmedlebshten/guestbook:$VERSION|g" $TARGET_FILE
          
          git add $TARGET_FILE
          git commit -m "chore: update image to $VERSION for ArgoCD [skip ci]"
          git push origin main